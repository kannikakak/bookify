name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      BACKEND_DEPLOY_HOOK: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}
      FRONTEND_DEPLOY_HOOK: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}

    steps:
      - name: Trigger backend deploy
        if: env.BACKEND_DEPLOY_HOOK != ''
        run: curl --fail --silent --show-error "$BACKEND_DEPLOY_HOOK"

      - name: Trigger frontend deploy
        if: env.FRONTEND_DEPLOY_HOOK != ''
        run: curl --fail --silent --show-error "$FRONTEND_DEPLOY_HOOK"

      - name: Skip deploy notice
        if: env.BACKEND_DEPLOY_HOOK == '' && env.FRONTEND_DEPLOY_HOOK == ''
        run: echo "Render deploy hook secrets are not configured, so only CI build checks were run."
